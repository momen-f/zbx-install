name: release

on:
  push:
    tags:
      - "v*"
  # Manual fallback for when the tag can't be pushed directly (e.g. from a
  # remote session whose git credentials are scoped to one branch):
  # dispatch with the tag name and `gh release create` makes the tag itself,
  # pointed at the checked-out main.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (must be v<VERSION>, e.g. v0.4.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Tag must match the VERSION file (catches a forgotten version bump)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          want="v$(cat VERSION)"
          if [[ "$TAG" != "$want" ]]; then
            echo "tag $TAG does not match VERSION file ($want)" >&2
            exit 1
          fi

      - name: Build and run the full test suite before publishing
        run: make test

      - name: Generate checksums
        run: (cd dist && sha256sum zbx-install.sh >SHA256SUMS)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # On dispatch there is no tag yet; --target makes gh create it at
          # the checked-out commit. On tag pushes the tag already exists and
          # --target is ignored.
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            dist/zbx-install.sh \
            dist/SHA256SUMS \
            install.sh \
            install.ps1 \
            --title "$TAG" \
            --generate-notes
