name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
          # Pinned exact versions (not apt's, which drift and gave a false
          # CI failure on 2026-07-05: apt's older shellcheck flagged SC2015 on
          # code the pinned 0.11.0 below — matching local dev — does not).
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz" \
            | tar -xJ -C /tmp
          sudo install /tmp/shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64" \
            -o /usr/local/bin/shfmt
          sudo chmod +x /usr/local/bin/shfmt

      - name: Format check (shfmt)
        run: make fmt

      - name: Lint (shellcheck)
        run: make lint

      - name: Unit tests (bats)
        run: make test

  smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: "ubuntu:22.04", id: "ubuntu", family: "debian" }
          - { image: "ubuntu:24.04", id: "ubuntu", family: "debian" }
          - { image: "debian:12", id: "debian", family: "debian" }
          - { image: "debian:13", id: "debian", family: "debian" }
          - { image: "rockylinux:9", id: "rocky", family: "rhel" }
          - { image: "almalinux:8", id: "almalinux", family: "rhel" }
          - { image: "amazonlinux:2023", id: "amzn", family: "rhel" }
          - { image: "opensuse/leap:15.6", id: "opensuse-leap", family: "suse" }
    steps:
      - uses: actions/checkout@v4

      - name: Build the bundle
        run: ./build.sh

      - name: Run --detect-only in ${{ matrix.image }}
        run: |
          out="$(docker run --rm -e DETECT_SKIP_NET=1 -v "$PWD:/w" -w /w \
            "${{ matrix.image }}" bash dist/zbx-install.sh --detect-only --no-color)"
          echo "$out"
          echo "$out" | grep -q "ID / version:    ${{ matrix.id }}"
          echo "$out" | grep -q "Family:          ${{ matrix.family }}"
          echo "$out" | grep -q "Supported:       yes"

      - name: Dry-run express plan in ${{ matrix.image }}
        run: |
          out="$(docker run --rm -e DETECT_SKIP_NET=1 -v "$PWD:/w" -w /w \
            "${{ matrix.image }}" bash dist/zbx-install.sh --dry-run --express --yes --no-color)"
          echo "$out"
          echo "$out" | grep -q "Plan summary (DRY-RUN)"
          echo "$out" | grep -q "7.0 (LTS)"
          echo "$out" | grep -q "zabbix-server-mysql"
          echo "$out" | grep -q "zabbix-agent2"
          echo "$out" | grep -q "auto-confirmed"
          echo "$out" | grep -q "DRY-RUN: no commands were executed"

      - name: No TTY without --yes exits 2 in ${{ matrix.image }}
        run: |
          set +e
          out="$(docker run --rm -e DETECT_SKIP_NET=1 -v "$PWD:/w" -w /w \
            "${{ matrix.image }}" bash dist/zbx-install.sh --dry-run --express --no-color 2>&1)"
          rc=$?
          set -e
          echo "$out"
          test "$rc" -eq 2
          echo "$out" | grep -q "No TTY available"

      - name: No TTY + bare --yes (no mode) exits 2, never silently installs, in ${{ matrix.image }}
        run: |
          set +e
          out="$(docker run --rm -e DETECT_SKIP_NET=1 -v "$PWD:/w" -w /w \
            "${{ matrix.image }}" bash dist/zbx-install.sh --yes --dry-run --no-color 2>&1)"
          rc=$?
          set -e
          echo "$out"
          test "$rc" -eq 2
          echo "$out" | grep -q "No TTY available"
          ! echo "$out" | grep -q "Plan summary"

  # Phase 3 acceptance (SPEC §18): a REAL (non-dry-run) install of the repo +
  # packages steps must succeed on Ubuntu 24.04 and Rocky 9. No DETECT_SKIP_NET
  # here — this hits the real repo.zabbix.com over the network, on purpose.
  # Phase 4 acceptance (SPEC §18): the same real run also provisions mariadb
  # and imports the schema (express mode's default DB engine) — verified
  # below by querying a real table, and the generated password must never
  # appear in the log (grepped after the run).
  # Phase 5 acceptance (SPEC §18): the same real run also renders configs,
  # opens firewall ports, and starts services (config.sh/firewall.sh/
  # services.sh) — verified below by actually curling the frontend and
  # confirming it lands on the login page, not the setup wizard.
  # Phase 6 acceptance (SPEC §18): the same real run finishes with all 9
  # health checks green (health.sh) and prints the final summary — verified
  # below by grepping the installer's own stdout for the green banner and a
  # couple of summary fields. Unattended mode exits 6 immediately on any
  # health-check failure (§13) — the install genuinely has to be correct,
  # not just "not crash", for this job to pass.
  # --admin-pass acceptance (§15.8): the same real run also opts into
  # changing the frontend Admin password — verified below with two real
  # JSON-RPC user.login calls against the live Zabbix instance: the new
  # generated password must work, and the old Admin/zabbix default must not,
  # proving the API call genuinely took effect rather than just being
  # attempted.
  #
  # db_mysql_provision() drives the DB through systemctl (unit detection +
  # enable --now), same as it would on a real target — a bare `docker run`
  # container has no systemd to talk to (no PID 1 init, systemctl either
  # missing or unable to reach a bus), which made "no mariadb/mysqld/mysql
  # service unit found" a false CI failure on 2026-07-05, not a real bug.
  # geerlingguy's docker-<os>-ansible images run systemd as PID 1 (built for
  # exactly this — testing service-managing automation in Docker) and are
  # otherwise the same base OS, so they're used here in place of the bare
  # images; --privileged + the cgroup bind-mount is systemd-in-Docker's
  # standard, documented requirement.
  real-install:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "geerlingguy/docker-ubuntu2404-ansible:latest"
            setup: "apt-get update -qq && apt-get install -y -qq curl ca-certificates"
            verify: "dpkg -l zabbix-agent2 zabbix-server-mysql zabbix-frontend-php"
          - image: "geerlingguy/docker-rockylinux9-ansible:latest"
            # This Ansible test image ships EPEL enabled, which carries its
            # own (older) zabbix-web — a real, documented conflict with the
            # official Zabbix repo's zabbix-web, not specific to this image.
            # A real target wouldn't have that clash, so disable EPEL here
            # rather than teach the installer to manage third-party repos it
            # didn't add (same call as the EL8/Remi and TimescaleDB cases).
            # (No dnf module workaround needed here anymore — the mariadb
            # module-stream bug this used to paper over is now fixed for
            # real in db_mysql_module_enable(), db_mysql.sh, and this job
            # is what actually exercises that fix on every push.)
            setup: "dnf -y install dnf-plugins-core >/dev/null 2>&1 || true; dnf config-manager --set-disabled epel >/dev/null 2>&1 || true"
            # zabbix-frontend-php doesn't exist on RHEL — the frontend
            # package there is zabbix-web-mysql (DB-engine-specific).
            verify: "rpm -q zabbix-agent2 zabbix-server-mysql zabbix-web-mysql"
    steps:
      - uses: actions/checkout@v4

      - name: Build the bundle
        run: ./build.sh

      - name: Real express install (repo + packages + database), then verify, in ${{ matrix.image }}
        run: |
          set -e
          cid="$(docker run -d --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$PWD:/w" "${{ matrix.image }}")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          echo "=== waiting for systemd to finish booting ==="
          for _ in $(seq 1 30); do
            state="$(docker exec "$cid" systemctl is-system-running 2>/dev/null || true)"
            case "$state" in running | degraded) break ;; esac
            sleep 1
          done
          echo "systemd state: $state"

          docker exec -w /w "$cid" bash -c '
            set -e
            ${{ matrix.setup }}
            set +e
            bash dist/zbx-install.sh --express --yes --admin-pass --generate-passwords --no-color --log-file /var/log/zbx.log >/tmp/install.out 2>&1
            rc=$?
            set -e
            echo "=== installer stdout (always shown) ==="
            cat /tmp/install.out
            echo "=== log tail (always shown) ==="
            tail -n 120 /var/log/zbx.log || true
            test "$rc" -eq 0
            echo "=== verifying installed packages ==="
            ${{ matrix.verify }}
            echo "=== verifying the schema was actually imported ==="
            test -f /root/zbx-install-credentials.txt
            pw="$(sed -n "s/^Database password: //p" /root/zbx-install-credentials.txt)"
            test -n "$pw"
            rows="$(mysql -u zabbix -p"$pw" zabbix -sNe "SELECT COUNT(*) FROM users")"
            test "$rows" -gt 0
            echo "=== verifying the generated password never reached the log ==="
            ! grep -qF "$pw" /var/log/zbx.log
            ! grep -qF "$pw" /tmp/install.out
            echo "=== verifying the frontend is reachable without the setup wizard ==="
            final_url="$(curl -sS -L -o /tmp/frontend.html -w "%{url_effective}" http://127.0.0.1/zabbix/)"
            echo "landed on: $final_url"
            case "$final_url" in *setup.php*) echo "landed on the setup wizard"; exit 1 ;; esac
            grep -qi zabbix /tmp/frontend.html
            echo "=== verifying all 9 health checks passed and the summary printed ==="
            grep -q "All checks passed" /tmp/install.out
            grep -q "Admin login:" /tmp/install.out
            grep -q "http://.*/zabbix/" /tmp/install.out
            grep -qi "uninstall" /tmp/install.out
            echo "=== verifying --admin-pass actually changed the frontend Admin password (§15.8) ==="
            adminpw="$(sed -n "s/^Frontend Admin password: //p" /root/zbx-install-credentials.txt)"
            test -n "$adminpw"
            ! grep -qF "$adminpw" /var/log/zbx.log
            ! grep -qF "$adminpw" /tmp/install.out
            newlogin="$(curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.login\",\"params\":{\"username\":\"Admin\",\"password\":\"$adminpw\"},\"id\":1}" \
              http://127.0.0.1/zabbix/api_jsonrpc.php)"
            echo "login with the new password: $newlogin"
            case "$newlogin" in *'"error"'*) echo "new password login failed"; exit 1 ;; esac
            oldlogin="$(curl -fsS -X POST -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.login\",\"params\":{\"username\":\"Admin\",\"password\":\"zabbix\"},\"id\":2}" \
              http://127.0.0.1/zabbix/api_jsonrpc.php)"
            echo "login with the old default password: $oldlogin"
            case "$oldlogin" in *'"error"'*) : ;; *) echo "old default password still works — password was not actually changed"; exit 1 ;; esac
          '

  # Proxy acceptance (SPEC §15.9): a REAL --proxy-only install must succeed for
  # BOTH DB backends on both a Debian- and an RHEL-family target. Same real
  # repo.zabbix.com network path and same systemd-in-Docker requirement as
  # real-install (a proxy enable --now needs systemd; a mysql-backed proxy
  # also needs its DB unit). The two backends exercise genuinely different
  # code: sqlite3 self-initializes an embedded DB file with no provisioning
  # (verified below by the file existing) while mysql provisions a real
  # zabbix_proxy DB and imports the plain-text proxy.sql (verified by querying
  # a real table). Both must finish with the proxy service up, port 10051
  # listening, and the "register a Proxy object on the server" reminder in the
  # summary — there is no full server here, so the proxy never connects, but
  # the daemon still starts and binds its trapper port.
  proxy-install:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "geerlingguy/docker-ubuntu2404-ansible:latest"
            setup: "apt-get update -qq && apt-get install -y -qq curl ca-certificates"
            db: "sqlite3"
            pkg_check: "dpkg -l zabbix-proxy-sqlite3"
          - image: "geerlingguy/docker-ubuntu2404-ansible:latest"
            setup: "apt-get update -qq && apt-get install -y -qq curl ca-certificates"
            db: "mysql"
            pkg_check: "dpkg -l zabbix-proxy-mysql zabbix-sql-scripts"
          - image: "geerlingguy/docker-rockylinux9-ansible:latest"
            # EPEL disabled for the same documented zabbix-web clash reason as
            # the real-install job (harmless here, kept for parity).
            setup: "dnf -y install dnf-plugins-core >/dev/null 2>&1 || true; dnf config-manager --set-disabled epel >/dev/null 2>&1 || true"
            db: "sqlite3"
            pkg_check: "rpm -q zabbix-proxy-sqlite3"
          - image: "geerlingguy/docker-rockylinux9-ansible:latest"
            setup: "dnf -y install dnf-plugins-core >/dev/null 2>&1 || true; dnf config-manager --set-disabled epel >/dev/null 2>&1 || true"
            db: "mysql"
            pkg_check: "rpm -q zabbix-proxy-mysql zabbix-sql-scripts"
    steps:
      - uses: actions/checkout@v4

      - name: Build the bundle
        run: ./build.sh

      - name: Real --proxy-only install (${{ matrix.db }}-backed), then verify, in ${{ matrix.image }}
        run: |
          set -e
          cid="$(docker run -d --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$PWD:/w" "${{ matrix.image }}")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          echo "=== waiting for systemd to finish booting ==="
          for _ in $(seq 1 30); do
            state="$(docker exec "$cid" systemctl is-system-running 2>/dev/null || true)"
            case "$state" in running | degraded) break ;; esac
            sleep 1
          done
          echo "systemd state: $state"

          docker exec -w /w "$cid" bash -c '
            set -e
            ${{ matrix.setup }}
            set +e
            bash dist/zbx-install.sh --proxy-only --yes --db ${{ matrix.db }} \
              --proxy-hostname ci-proxy --generate-passwords --no-color \
              --log-file /var/log/zbx.log >/tmp/install.out 2>&1
            rc=$?
            set -e
            echo "=== installer stdout (always shown) ==="
            cat /tmp/install.out
            echo "=== log tail (always shown) ==="
            tail -n 120 /var/log/zbx.log || true
            echo "=== zabbix_proxy.log (always shown) ==="
            tail -n 60 /var/log/zabbix/zabbix_proxy.log 2>/dev/null || true
            test "$rc" -eq 0
            echo "=== verifying installed packages ==="
            ${{ matrix.pkg_check }}
            echo "=== verifying the proxy service is active and port 10051 is listening ==="
            systemctl is-active --quiet zabbix-proxy
            ss -ltnH "sport = :10051" | grep -q .
            if [ "${{ matrix.db }}" = "sqlite3" ]; then
              echo "=== verifying the embedded sqlite3 DB self-initialized ==="
              test -s /var/lib/zabbix/zabbix_proxy.db
              # sqlite3-backed proxy provisions no DB user/password, so no
              # credentials summary is written (§15.9).
            else
              echo "=== verifying the zabbix_proxy schema was actually imported ==="
              test -f /root/zbx-install-credentials.txt
              pw="$(sed -n "s/^Database password: //p" /root/zbx-install-credentials.txt)"
              test -n "$pw"
              # The proxy schema ships a users table but leaves it empty (a
              # proxy has no login users), so assert on dbversion instead — it
              # carries exactly one row (the schema version) in every Zabbix DB.
              rows="$(mysql -u zabbix -p"$pw" zabbix_proxy -sNe "SELECT COUNT(*) FROM dbversion")"
              test "$rows" -ge 1
              echo "=== verifying the generated password never reached the log ==="
              ! grep -qF "$pw" /var/log/zbx.log
              ! grep -qF "$pw" /tmp/install.out
            fi
            echo "=== verifying the health summary printed the proxy registration reminder ==="
            grep -q "All checks passed" /tmp/install.out
            grep -q "Proxy hostname:" /tmp/install.out
            grep -q "ci-proxy" /tmp/install.out
            grep -q "must be registered as a matching Proxy object" /tmp/install.out
          '

  # macOS agent acceptance (§4): a REAL install of the signed zabbix_agentd .pkg
  # on a genuine Apple-Silicon runner — the end-to-end verification the ARM
  # Linux paths can't get. macOS ships bash 3.2, so build+run under Homebrew's
  # bash; the install needs root for installer(8) + a system LaunchDaemon.
  macos-agent:
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Modern bash + build the bundle
        run: |
          brew install bash >/dev/null || brew list bash >/dev/null
          echo "BASH_BIN=$(brew --prefix)/bin/bash" >>"$GITHUB_ENV"
          "$(brew --prefix)/bin/bash" --version | head -1
          "$(brew --prefix)/bin/bash" ./build.sh

      - name: Real agent install (downloads + installs the signed .pkg)
        run: |
          set -o pipefail
          if ! sudo "$BASH_BIN" dist/zbx-install.sh --express --yes --no-color | tee /tmp/install.out; then
            echo "=== installer log (run() command output lands here, not stdout) ==="
            sudo cat /var/log/zbx-install-*.log 2>/dev/null || true
            exit 1
          fi

      - name: Verify the agent installed and is listening on 10050
        run: |
          echo "=== binary + config from the .pkg ==="
          test -x /usr/local/sbin/zabbix_agentd
          test -f /usr/local/etc/zabbix/zabbix_agentd.conf
          echo "=== LaunchDaemon loaded ==="
          sudo launchctl print system/com.zabbix.zabbix_agentd >/dev/null 2>&1 ||
            sudo launchctl list | grep -q zabbix
          echo "=== agent listening on 10050 ==="
          ok=0
          for _ in $(seq 1 15); do
            if sudo lsof -nP -iTCP:10050 -sTCP:LISTEN 2>/dev/null | grep -q LISTEN; then ok=1; break; fi
            sleep 1
          done
          sudo lsof -nP -iTCP:10050 -sTCP:LISTEN || true
          test "$ok" = "1"
          echo "=== installer reported success ==="
          grep -q "Plan (macOS agent)" /tmp/install.out

      - name: --uninstall removes the agent
        run: |
          sudo "$BASH_BIN" dist/zbx-install.sh --uninstall --yes --no-color
          sleep 2
          echo "=== binary + LaunchDaemon gone ==="
          ! test -x /usr/local/sbin/zabbix_agentd
          ! test -f /Library/LaunchDaemons/com.zabbix.zabbix_agentd.plist
          echo "=== no longer listening on 10050 ==="
          ! (sudo lsof -nP -iTCP:10050 -sTCP:LISTEN 2>/dev/null | grep -q LISTEN)

      # GitHub retired its Intel macOS runners, so the Intel (x86_64) tar.gz
      # path can't be really installed in CI. Two proxies stand in: a dry-run
      # asserting the routing/URL, and a HEAD probe of the actual tar.gz on
      # the CDN so a silent upstream renaming fails the build loudly.
      - name: Intel (x86_64) tar.gz path — dry-run routing + CDN liveness probe
        run: |
          ZBX_UNAME_M=x86_64 "$BASH_BIN" dist/zbx-install.sh \
            --express --yes --dry-run --no-color | tee /tmp/intel-dryrun.out
          grep -q "tar.gz archive" /tmp/intel-dryrun.out
          url="$(grep -o 'https://cdn.zabbix.com[^ ]*macos-amd64[^ ]*\.tar\.gz' /tmp/intel-dryrun.out | head -1)"
          test -n "$url"
          echo "=== probing $url ==="
          # cdn.zabbix.com resets plain HEAD requests (curl exit 56), so probe
          # with a 1-byte ranged GET instead — -f still fails loudly on a 404.
          curl -fsSL -r 0-0 -o /dev/null "$url"

  # Windows agent acceptance: a REAL install of the official Zabbix agent MSI
  # via the native install.ps1 — the only way to run zbx-install on Windows
  # (no bash). Covers both the classic agentd (default) and agent2, plus
  # uninstall, and doubles as the live verification of the CDN MSI URL shape.
  windows-agent:
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: PSScriptAnalyzer lint
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          # Write-Host is deliberate (interactive installer talking to a
          # console); PSReviewUnusedParameter false-positives on script params
          # that are only read inside functions.
          $findings = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Warning,Error `
            -ExcludeRule PSAvoidUsingWriteHost,PSReviewUnusedParameter
          $findings | Format-Table -AutoSize
          if ($findings) { exit 1 }

      - name: Pester unit tests
        run: |
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
          Invoke-Pester tests/pester -CI

      - name: Real agent install (classic zabbix_agentd)
        run: ./install.ps1 -Server 127.0.0.1 -Yes

      - name: Verify service running and listening on 10050
        run: |
          Get-Service 'Zabbix Agent*' | Format-Table -AutoSize
          if (-not (Get-Service 'Zabbix Agent*' | Where-Object Status -eq Running)) { exit 1 }
          if (-not (Get-NetTCPConnection -LocalPort 10050 -State Listen -ErrorAction SilentlyContinue)) { exit 1 }

      - name: -Uninstall removes the agent
        run: |
          ./install.ps1 -Uninstall -Yes
          if (Get-Service 'Zabbix Agent*' -ErrorAction SilentlyContinue) { exit 1 }

      - name: Agent2 install/uninstall round-trip
        run: |
          ./install.ps1 -Agent2 -Server 127.0.0.1 -Yes
          if (-not (Get-Service 'Zabbix Agent*' | Where-Object Status -eq Running)) { exit 1 }
          ./install.ps1 -Uninstall -Yes
          if (Get-Service 'Zabbix Agent*' -ErrorAction SilentlyContinue) { exit 1 }

      - name: Surface the msiexec log on failure
        if: failure()
        run: Get-Content "$env:TEMP\zbx-agent-msi.log" -Tail 100 -ErrorAction SilentlyContinue
